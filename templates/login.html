<!DOCTYPE html>
<html>
<head>
    <title>Login - Job Portal</title>

    <style>
        body {
            font-family: Arial;
            background: #f2f4f7;
        }

        .box {
            width: 350px;
            margin: 100px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #0a66c2;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #004182;
        }

        h2 {
            text-align: center;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>Login</h2>

    <form method="POST">

        <input type="email" name="email" placeholder="Email" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>

    </form>

</div>

</body>
</html>
