<!DOCTYPE html>
<html>
<head>
    <title>Job Portal</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f3f6f9;
        }

        .header {
            background: #0a66c2;
            color: white;
            padding: 15px;
        }

        .container {
            width: 75%;
            margin: auto;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            background: white;
            color: #0a66c2;
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
        }

        .btn:hover {
            background: #ddd;
        }

        .job {
            background: white;
            padding: 20px;
            margin: 15px 0;
            border-radius: 10px;
            box-shadow: 0px 0px 6px #ccc;
        }

        .apply-btn {
            background: #0a66c2;
            color: white;
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .apply-btn:hover {
            background: #004182;
        }

        .upload-box {
            margin-top: 10px;
        }

        input[type="file"] {
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <div style="background:#0a66c2; padding:15px; color:white;">
    <div style="width:80%; margin:auto; display:flex; justify-content:space-between; align-items:center;">

        <h2 style="margin:0;">Job Portal</h2>

        <div>
            
            <a href="/my-applications" style="color:white; margin-right:10px;">My Jobs</a>
            <a href="/logout" style="color:white; background:#ff4d4d; padding:6px 10px; border-radius:5px; text-decoration:none;">Logout</a>
        </div>

    </div>
</div>


<div class="container">

    <h3>Welcome: {{ session['user'] }}</h3>

    <h2>Available Jobs</h2>

    {% for job in jobs %}

    <div class="job">

        <h3>{{ job[1] }}</h3>
        <p><b>Company:</b> {{ job[2] }}</p>
        <p><b>Location:</b> {{ job[3] }}</p>
        <p>{{ job[4] }}</p>

        <a href="/apply/{{ job[0] }}">
            <button class="apply-btn">Apply Now</button>
        </a>

        <div class="upload-box">
            <form action="/upload" method="post" enctype="multipart/form-data">
                <input type="file" name="resume" required>
                <button class="apply-btn">Upload Resume</button>
            </form>
        </div>

    </div>

    {% endfor %}

</div>

</body>
</html>
