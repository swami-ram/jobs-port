<!DOCTYPE html>
<html>
<head>
    <title>Job Portal</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        .navbar {
            background: #0a66c2;
            padding: 15px;
            color: white;
            display: flex;
            justify-content: space-between;
        }

        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .login {
            background: white;
            color: #0a66c2;
        }

        .register {
            background: #ff4d4d;
            color: white;
        }

        .hero {
            text-align: center;
            padding: 100px 20px;
            background: #f2f4f7;
        }

        h1 {
            font-size: 40px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <h2>Job Portal</h2>

    <div>
        <a href="/login">
            <button class="btn login">Login</button>
        </a>

        <a href="/register">
            <button class="btn register">Register</button>
        </a>
    </div>
</div>

<div class="hero">

    <h1>Find Your Dream Job</h1>
    <p>Apply for jobs and start your career</p>

</div>

</body>
</html>
